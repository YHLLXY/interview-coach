<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI面试官训练营 · 面试质量评估与提升平台</title>
<style>
  :root{
    --bg:#0a0e17;--card:#111827;--card2:#1a2235;--card3:#1e293b;
    --text:#e2e8f0;--text2:#94a3b8;--border:#1e293b;
    --cyan:#06b6d4;--purple:#a855f7;--gold:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;
    background-image:radial-gradient(ellipse at 30% 0%,rgba(6,182,212,0.06) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(168,85,247,0.05) 0%,transparent 50%);
  }

  /* Animated grid + orbs */
  .bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.03;
    background-image:linear-gradient(rgba(6,182,212,0.5) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,0.5) 1px,transparent 1px);
    background-size:40px 40px;animation:gridShift 15s linear infinite}
  @keyframes gridShift{0%{background-position:0 0}100%{background-position:40px 40px}}
  .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;opacity:0.1}
  .orb-a{width:300px;height:300px;background:var(--cyan);top:5%;left:-5%;animation:floatA 8s ease-in-out infinite}
  .orb-b{width:250px;height:250px;background:var(--purple);bottom:10%;right:-3%;animation:floatB 10s ease-in-out infinite}
  @keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-30px)}}
  @keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,20px)}}

  .header{
    background:linear-gradient(180deg,rgba(17,24,39,0.97),rgba(17,24,39,0.85));border-bottom:1px solid var(--border);
    padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
  }
  .header .brand{display:flex;align-items:center;gap:8px}
  .header .logo{font-size:28px;animation:logoPulse 2s ease-in-out infinite}
  @keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 3px var(--cyan))}50%{filter:drop-shadow(0 0 16px var(--cyan))}}
  .header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

  .container{max-width:1300px;margin:0 auto;padding:16px 20px 60px;position:relative;z-index:1}

  /* Top bar */
  .top-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .role-tabs{display:flex;gap:3px;background:var(--card);border-radius:12px;padding:3px;border:1px solid var(--border)}
  .role-tab{padding:10px 20px;border:none;background:transparent;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all 0.3s}
  .role-tab:hover{background:var(--card2)}
  .role-tab.active{background:linear-gradient(135deg,rgba(6,182,212,0.2),rgba(168,85,247,0.2));color:var(--cyan)}
  .identity-select{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text);font-size:13px;cursor:pointer;outline:none;font-family:inherit}
  .identity-select:focus{border-color:var(--cyan)}

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr)}}
  .stat-card{
    background:var(--card);border-radius:12px;padding:18px;border:1px solid var(--border);
    transition:all 0.4s;cursor:default;border-top:2px solid transparent;position:relative;overflow:hidden;
  }
  .stat-card:hover{transform:translateY(-3px)}
  .stat-card.c1{border-top-color:var(--cyan)}.stat-card.c1:hover{box-shadow:0 0 20px rgba(6,182,212,0.12)}
  .stat-card.c2{border-top-color:var(--purple)}.stat-card.c2:hover{box-shadow:0 0 20px rgba(168,85,247,0.12)}
  .stat-card.c3{border-top-color:var(--gold)}.stat-card.c3:hover{box-shadow:0 0 20px rgba(245,158,11,0.12)}
  .stat-card.c4{border-top-color:var(--green)}.stat-card.c4:hover{box-shadow:0 0 20px rgba(16,185,129,0.12)}
  .stat-card .stat-icon{font-size:26px;margin-bottom:6px}
  .stat-card .stat-value{font-size:28px;font-weight:800}
  .stat-card .stat-label{font-size:11px;color:var(--text2);margin-top:2px}
  .stat-card .stat-sub{font-size:10px;margin-top:4px}
  .stat-glow{position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;filter:blur(30px);opacity:0.15;transition:opacity 0.4s}
  .stat-card:hover .stat-glow{opacity:0.3}

  /* Card */
  .card{background:var(--card);border-radius:14px;padding:22px;margin-bottom:16px;border:1px solid var(--border);transition:all 0.3s}
  .card:hover{border-color:rgba(6,182,212,0.25)}
  .card h2{font-size:17px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .card .subtitle{font-size:12px;color:var(--text2);margin-bottom:16px}
  .card .refresh-btn{margin-left:auto;font-size:18px;cursor:pointer;transition:transform 0.6s;display:inline-block}
  .card .refresh-btn:hover{transform:rotate(180deg)}

  /* Score ring */
  .score-ring{display:inline-flex;align-items:center;justify-content:center;position:relative}
  .score-ring svg{transform:rotate(-90deg)}
  .score-ring .ring-val{position:absolute;font-size:22px;font-weight:800}
  .score-ring.sm svg{width:60px;height:60px}
  .score-ring.sm .ring-val{font-size:16px}

  /* Interview cards */
  .interview-list{display:flex;flex-direction:column;gap:10px}
  .interview-item{
    background:var(--card2);border-radius:12px;padding:16px;border:1px solid var(--border);
    transition:all 0.3s;cursor:pointer;display:flex;gap:16px;align-items:flex-start;
  }
  .interview-item:hover{border-color:var(--cyan);transform:translateX(3px)}
  .interview-item .iv-score{flex-shrink:0}
  .interview-item .iv-info{flex:1;min-width:0}
  .interview-item .iv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:8px}
  .interview-item .iv-title{font-weight:700;font-size:14px}
  .interview-item .iv-meta{font-size:11px;color:var(--text2);display:flex;gap:16px;flex-wrap:wrap}
  .interview-item .iv-dimensions{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .dimension-bar{display:flex;align-items:center;gap:6px;font-size:11px}
  .dimension-bar .dim-label{color:var(--text2);white-space:nowrap}
  .dimension-bar .dim-track{width:80px;height:5px;border-radius:3px;background:var(--border);overflow:hidden}
  .dimension-bar .dim-fill{height:100%;border-radius:3px;transition:width 0.8s ease}
  .dim-fill.good{background:var(--green)}.dim-fill.ok{background:var(--gold)}.dim-fill.bad{background:var(--red)}

  /* AI feedback box */
  .ai-feedback{
    margin-top:10px;padding:12px;border-radius:10px;
    background:linear-gradient(135deg,rgba(6,182,212,0.06),rgba(168,85,247,0.06));
    border:1px solid rgba(6,182,212,0.15);font-size:12px;position:relative;overflow:hidden;
  }
  .ai-feedback::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scanLine 3s linear infinite}
  @keyframes scanLine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  .ai-feedback .fb-item{margin:4px 0;padding-left:8px;border-left:2px solid var(--cyan)}

  /* Practice mode */
  .practice-card{background:var(--card2);border-radius:12px;padding:20px;border:2px dashed var(--border);text-align:center;transition:all 0.3s}
  .practice-card:hover{border-color:var(--purple)}
  .practice-card .scenario-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin:12px 0}
  .scenario-btn{
    padding:12px;border-radius:10px;background:var(--card3);border:1px solid var(--border);
    cursor:pointer;transition:all 0.3s;text-align:left;font-size:12px;color:var(--text);font-family:inherit;
  }
  .scenario-btn:hover{border-color:var(--cyan);transform:translateY(-2px)}
  .scenario-btn .sc-icon{font-size:20px;margin-bottom:4px;display:block}

  /* Table */
  .quality-table{width:100%;border-collapse:collapse;font-size:13px}
  .quality-table th{text-align:left;padding:10px 12px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .quality-table td{padding:10px 12px;border-bottom:1px solid rgba(30,41,59,0.5)}
  .quality-table tbody tr{transition:all 0.2s;cursor:pointer}
  .quality-table tbody tr:hover{background:rgba(6,182,212,0.03)}

  /* Badge */
  .badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700}
  .badge-good{background:rgba(16,185,129,0.15);color:var(--green)}
  .badge-ok{background:rgba(245,158,11,0.15);color:var(--gold)}
  .badge-bad{background:rgba(239,68,68,0.15);color:var(--red)}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:var(--card);border-radius:16px;padding:28px;max-width:600px;width:92%;border:1px solid var(--border);animation:modalIn 0.3s ease;max-height:85vh;overflow-y:auto}
  @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal h3{font-size:18px;margin-bottom:16px}
  .modal label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin:10px 0 4px}
  .modal input,.modal select,.modal textarea{
    width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);
    background:var(--card2);color:var(--text);font-size:13px;font-family:inherit;outline:none;
  }
  .modal textarea{resize:vertical;min-height:80px}
  .modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

  /* Buttons */
  .btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.3s;border:none;display:inline-flex;align-items:center;gap:4px}
  .btn-cyan{background:var(--cyan);color:#000}.btn-cyan:hover{box-shadow:0 0 16px rgba(6,182,212,0.4);transform:translateY(-1px)}
  .btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{box-shadow:0 0 16px rgba(168,85,247,0.4)}
  .btn-gold{background:var(--gold);color:#000}
  .btn-green{background:var(--green);color:#fff}
  .btn-outline{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}
  .btn-sm{padding:4px 10px;font-size:10px;border-radius:5px}

  .tab-content{display:none}
  .tab-content.show{display:block;animation:fadeSlide 0.35s ease}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-weight:500;z-index:300;animation:slideIn 0.35s ease;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
  @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  .toast.success{background:var(--green)}.toast.info{background:var(--cyan);color:#000}.toast.warn{background:var(--gold);color:#000}
</style>
</head>
<body>

<div class="bg-grid"></div><div class="orb orb-a"></div><div class="orb orb-b"></div>

<div class="header">
  <div class="brand"><span class="logo">🎙️</span><h1>AI面试官训练营 · 面试质量评估与提升</h1></div>
  <span style="font-size:11px;color:var(--text2)">📅 <span id="clock"></span></span>
</div>

<div class="container">

  <div class="top-bar">
    <div class="role-tabs">
      <button class="role-tab active" onclick="switchRole('interviewer')">🎙️ 面试官视角</button>
      <button class="role-tab" onclick="switchRole('hr')">📊 HR 管理视角</button>
    </div>
    <select class="identity-select" id="identitySelect" onchange="switchIdentity(this.value)"></select>
    <span style="font-size:11px;color:var(--text2)" id="identityHint"></span>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <!-- ===== INTERVIEWER VIEW ===== -->
  <div class="tab-content show" id="view-interviewer">
    <div class="card">
      <h2>📋 我的面试记录 <span class="refresh-btn" onclick="renderInterviewerView()">🔄</span></h2>
      <p class="subtitle">每场面试的AI四维评估（结构化/偏见风险/候选人体验/问题有效性）</p>
      <button class="btn btn-cyan" onclick="openRecordModal()" style="margin-bottom:12px">➕ 记录新面试 · 获取AI评估</button>
      <div id="coachingNotif" style="display:none;margin-bottom:12px;padding:10px 14px;border-radius:8px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.3);font-size:13px"></div>
      <div class="interview-list" id="myInterviews"></div>
    </div>
    <div class="card">
      <h2>🎯 AI模拟面试练习 <span class="refresh-btn" onclick="renderPracticeMode()">🔄</span></h2>
      <p class="subtitle">选择一个场景，AI扮演候选人，练习你的面试技巧并获得即时反馈</p>
      <div class="practice-card" id="practicePanel">
        <p style="color:var(--text2);margin-bottom:8px">选择练习场景：</p>
        <div class="scenario-select" id="scenarioGrid"></div>
        <div id="practiceResult" style="margin-top:12px"></div>
      </div>
    </div>
    <div class="card">
      <h2>📈 我的成长趋势</h2>
      <div id="growthTrend"></div>
    </div>
  </div>

  <!-- ===== HR VIEW ===== -->
  <div class="tab-content" id="view-hr">
    <div class="card">
      <h2>📊 团队面试质量看板 <span class="refresh-btn" onclick="renderHRView()">🔄</span></h2>
      <p class="subtitle">8位面试官的表现对比 · 点击面试官查看详情</p>
      <table class="quality-table">
        <thead><tr><th>面试官</th><th>累计面试</th><th>结构化</th><th>偏见控制</th><th>候选人体验</th><th>问题有效性</th><th>综合评分</th><th>趋势</th><th>操作</th></tr></thead>
        <tbody id="qualityTable"></tbody>
      </table>
    </div>
    <div class="card">
      <h2>🚨 AI 质量预警</h2>
      <div id="hrAlerts"></div>
    </div>
    <div class="card">
      <h2>📚 最佳实践库 <span class="refresh-btn" onclick="renderBestPractices()">🔄</span></h2>
      <div id="bestPractices"></div>
    </div>
  </div>
</div>

<!-- Record Interview Modal -->
<div class="modal-overlay" id="recordModal"><div class="modal"><h3>📋 记录新面试 · AI自动评估</h3>
  <label>候选人姓名</label><input type="text" id="recCandidate" placeholder="如：应聘者K">
  <label>应聘岗位</label><input type="text" id="recPosition" placeholder="如：前端开发工程师">
  <label>面试日期</label><input type="date" id="recDate">
  <label>面试笔记（AI将据此分析面试质量）</label><textarea id="recNotes" placeholder="记录面试过程，AI会自动评估结构化程度、偏见风险、候选人体验和问题有效性...&#10;&#10;例如：&#10;1. 开场让候选人做了自我介绍&#10;2. 问了算法题，候选人用了暴力解法，我追问了优化方向&#10;3. 问了"你最大的缺点"，候选人回答比较坦诚&#10;4. 最后给候选人留了5分钟提问时间"></textarea>
  <div class="btn-row"><button class="btn btn-outline" onclick="closeModal('recordModal')">取消</button><button class="btn btn-cyan" onclick="submitNewInterview()">🤖 提交并获取AI评估</button></div>
</div></div>

<script>
// ==================== DATA ====================
// Coaching tasks (HR assigns → interviewer receives)
let coachingTasks = [
  {id:1,interviewerId:4,from:'HR',message:'面试官认证培训通知：你的近3场面试存在结构化不足和偏见风险问题，请于本周五前完成《面试官法律合规与结构化面试》在线课程。',date:'2026-06-03',read:false},
];
const interviewers = [
  {id:1,name:'张明（技术总监）',role:'技术面试官',total:48,trend:'↑'},
  {id:2,name:'李华（产品负责人）',role:'产品面试官',total:35,trend:'→'},
  {id:3,name:'王芳（HR经理）',role:'综合面试官',total:62,trend:'↑'},
  {id:4,name:'陈鹏（高级工程师）',role:'技术面试官',total:22,trend:'↓'},
  {id:5,name:'刘悦（设计主管）',role:'设计面试官',total:18,trend:'→'},
  {id:6,name:'赵磊（销售总监）',role:'业务面试官',total:30,trend:'↑'},
  {id:7,name:'孙婷（HRBP）',role:'综合面试官',total:41,trend:'↓'},
  {id:8,name:'周杰（技术专家）',role:'技术面试官',total:15,trend:'→'},
];

// Interview records with AI scores
let interviews = [
  {id:1,interviewerId:1,candidate:'应聘者A',position:'前端开发',date:'2026-06-03',structure:85,bias:72,experience:90,effect:80,overall:82,status:'completed',
    note:'面试过程整体流畅，技术问题覆盖全面。但在追问环节有2次打断候选人，需要注意倾听。结构化问题占比70%，可以进一步提升。',
    strengths:['技术问题覆盖面广','能深入挖掘项目经验','时间控制合理'],
    improvements:['减少打断候选人的频率','增加行为面试法的使用','结尾给候选人留更多提问时间']},
  {id:2,interviewerId:1,candidate:'应聘者B',position:'后端开发',date:'2026-05-28',structure:78,bias:65,experience:82,effect:75,overall:75,status:'completed',
    note:'整体表现中规中矩。在"你最大的缺点是什么"问题上追问方式可能给候选人带来压力。建议使用更温和的表达方式。',
    strengths:['面试流程完整','对技术深度有较好判断'],
    improvements:['注意压力问题的表达方式','增强候选人体验意识','准备更多开放性问题']},
  {id:3,interviewerId:1,candidate:'应聘者C',position:'全栈开发',date:'2026-05-20',structure:92,bias:85,experience:88,effect:90,overall:89,status:'completed',
    note:'这是一场高质量的面试！结构化程度高，几乎无偏见风险，候选人反馈积极。可以录为团队最佳实践案例。',
    strengths:['结构化问题比例优秀','候选人参与感强','问题之间逻辑衔接自然'],
    improvements:['可以在结尾更明确地介绍下一步流程','偶尔可以多一些即兴追问']},
  {id:4,interviewerId:2,candidate:'应聘者D',position:'产品经理',date:'2026-06-02',structure:65,bias:58,experience:70,effect:62,overall:64,status:'completed',
    note:'结构化程度偏低，面试过程较多自由发散。建议准备结构化面试提纲。另外，对"是否打算结婚"等与工作无关的问题需要特别注意，存在法律风险。',
    strengths:['建立了良好的沟通氛围'],
    improvements:['必须停止询问与工作无关的个人问题','准备结构化面试提纲','提升问题有效性']},
  {id:5,interviewerId:2,candidate:'应聘者E',position:'产品经理',date:'2026-05-25',structure:72,bias:70,experience:78,effect:75,overall:74,status:'completed',
    note:'较上一次有进步，开始使用结构化提纲。但在评估候选人时仍有"像我效应"——对背景相似的候选人评分偏高。',
    strengths:['使用了结构化提纲','给候选人充足的展示时间'],

// ==================== ROLE SWITCH ====================
function switchRole(role){
  currentRole=role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('show'));
  if(role==='interviewer'){document.querySelectorAll('.role-tab')[0].classList.add('active');document.getElementById('view-interviewer').classList.add('show')}
  else{document.querySelectorAll('.role-tab')[1].classList.add('active');document.getElementById('view-hr').classList.add('show')}
  updateIdentitySelect(); renderAll();
}

function switchIdentity(val){
  if(currentRole==='interviewer') currentInterviewerId=parseInt(val);
  renderAll();
}

function updateIdentitySelect(){
  const sel=document.getElementById('identitySelect');
  const hint=document.getElementById('identityHint');
  if(currentRole==='interviewer'){
    sel.innerHTML=interviewers.map(i=>`<option value="${i.id}" ${i.id===currentInterviewerId?'selected':''}>🎙️ ${i.name}</option>`).join('');
    hint.textContent='— 选择查看哪位面试官';
  }else{
    sel.innerHTML='<option>HR 全局视角</option>';
    hint.textContent='';
  }
}

function renderAll(){
  renderStats();
  if(currentRole==='interviewer'){renderInterviewerView();renderPracticeMode();renderGrowthTrend();renderCoachingNotif()}
  else{renderHRView();renderBestPractices()}
}

// ==================== STATS ====================
function renderStats(){
  if(currentRole==='interviewer'){
    const myIv=interviews.filter(i=>i.interviewerId===currentInterviewerId);
    const avg=myIv.length?Math.round(myIv.reduce((s,i)=>s+i.overall,0)/myIv.length):0;
    const best=myIv.length?Math.max(...myIv.map(i=>i.overall)):0;
    const needsImprove=myIv.filter(i=>i.overall<70).length;
    const interviewer=interviewers.find(i=>i.id===currentInterviewerId);
    document.getElementById('statsRow').innerHTML=[
      {icon:'📊',value:avg+'',label:'AI综合评分',sub:myIv.length+'场面试',cls:'c1'},
      {icon:'🏆',value:best+'',label:'最佳表现',sub:'最高单场评分',cls:'c2'},
      {icon:'📈',value:interviewer?.total+'',label:'累计面试',sub:'趋势 '+interviewer?.trend,cls:'c3'},
      {icon:'🎯',value:needsImprove+'',label:'需改进场次',sub:needsImprove?'需重点关注':'全部及格',cls:needsImprove?'c4':''},
    ].filter(s=>s.cls).map(s=>`<div class="stat-card ${s.cls}"><div class="stat-glow"></div><div class="stat-icon">${s.icon}</div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div><div class="stat-sub">${s.sub}</div></div>`).join('');
  }else{
    const allAvg=Math.round(interviewers.reduce((s,i)=>{const iv=interviews.filter(x=>x.interviewerId===i.id);return s+(iv.length?Math.round(iv.reduce((a,b)=>a+b.overall,0)/iv.length):0)},0)/interviewers.length);
    const redList=interviewers.filter(i=>{const iv=interviews.filter(x=>x.interviewerId===i.id);const avg=iv.length?Math.round(iv.reduce((a,b)=>a+b.overall,0)/iv.length):0;return avg<70;}).length;
    document.getElementById('statsRow').innerHTML=[
      {icon:'👥',value:interviewers.length+'',label:'面试官总数',sub:'覆盖技术/产品/设计/销售/HR',cls:'c1'},
      {icon:'📊',value:allAvg+'',label:'团队均分',sub:interviews.length+'场面试数据',cls:'c2'},
      {icon:'🎙️',value:interviews.length+'',label:'累计面试记录',sub:'AI分析覆盖100%',cls:'c3'},
      {icon:'⚠️',value:redList+'',label:'需培训面试官',sub:redList?'需安排辅导':'全员达标',cls:redList?'c4':''},
    ].filter(s=>s.cls).map(s=>`<div class="stat-card ${s.cls}"><div class="stat-glow"></div><div class="stat-icon">${s.icon}</div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div><div class="stat-sub">${s.sub}</div></div>`).join('');
  }
}

// ==================== GROWTH TREND ====================
function renderGrowthTrend(){
  const myIv=interviews.filter(i=>i.interviewerId===currentInterviewerId).sort((a,b)=>a.date.localeCompare(b.date));
  if(myIv.length<2){document.getElementById('growthTrend').innerHTML='<p style="color:var(--text2);font-size:13px">至少需要2场面试才能生成趋势分析</p>';return;}
  const first=myIv[0].overall,last=myIv[myIv.length-1].overall,change=last-first;
  const trendIcon=change>5?'🚀':change>0?'📈':change==0?'➡️':'📉';
  const trendColor=change>0?'var(--green)':change<0?'var(--red)':'var(--text2)';
  document.getElementById('growthTrend').innerHTML=`
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <div style="text-align:center;padding:16px;background:var(--card2);border-radius:12px;flex:1;min-width:100px">
        <div style="font-size:28px">${trendIcon}</div>
        <div style="font-size:20px;font-weight:800;color:${trendColor}">${change>0?'+':''}${change}</div>
        <div style="font-size:11px;color:var(--text2)">评分变化 (${myIv[0].date}→${myIv[myIv.length-1].date})</div>
      </div>
      <div style="flex:2;min-width:200px">
        ${myIv.map((iv,i)=>`
          <div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px">
            <span style="color:var(--text2);min-width:70px">${iv.date}</span>
            <div style="flex:1;height:16px;background:var(--border);border-radius:8px;overflow:hidden">
              <div style="height:100%;width:${iv.overall}%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:8px;transition:width 0.8s ease"></div>
            </div>
            <span style="font-weight:700;min-width:28px">${iv.overall}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ==================== HR VIEW ====================
function renderHRView(){
  document.getElementById('qualityTable').innerHTML=interviewers.map(iv=>{
    const ivs=interviews.filter(i=>i.interviewerId===iv.id);
    const avg=(arr)=>{const v=ivs.map(i=>i[arr]);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0};
    const avgO=ivs.length?Math.round(ivs.reduce((a,b)=>a+b.overall,0)/ivs.length):0;
    const cl=avgO>=80?'badge-good':avgO>=65?'badge-ok':'badge-bad';
    return`<tr onclick="showInterviewerDetail(${iv.id})">
      <td><strong>${iv.name.split('（')[0]}</strong><br><span style="font-size:10px;color:var(--text2)">${iv.role}</span></td>
      <td>${iv.total}</td>
      <td>${avg('structure')}</td><td>${avg('bias')}</td><td>${avg('experience')}</td><td>${avg('effect')}</td>
      <td><span class="badge ${cl}">${avgO}</span></td>
      <td>${iv.trend}</td>
      <td><button class="btn btn-cyan btn-sm" onclick="event.stopPropagation();switchToInterviewer(${iv.id})">🔍 查看</button> ${avgO<70?`<button class="btn btn-purple btn-sm" onclick="event.stopPropagation();assignCoaching(${iv.id})">📋 指派辅导</button>`:''}</td>
    </tr>`;
  }).join('');

  // Alerts
  const risky=interviewers.filter(i=>{const iv=interviews.filter(x=>x.interviewerId===i.id);return iv.some(x=>x.bias<55||x.structure<55)});
  document.getElementById('hrAlerts').innerHTML=risky.length===0?'<p style="color:var(--green)">✅ 所有面试官表现正常</p>':
    risky.map(i=>{const iv=interviews.filter(x=>x.interviewerId===i.id);return`<div style="padding:10px;margin:6px 0;background:rgba(239,68,68,0.06);border-radius:8px;border-left:3px solid var(--red);font-size:13px">🔴 <strong>${i.name.split('（')[0]}</strong>：${iv.filter(x=>x.bias<55).length}场偏见风险 / ${iv.filter(x=>x.structure<55).length}场结构化不足 — <span style="color:var(--red)">建议安排面试官认证培训</span></div>`}).join('');
}

function showInterviewerDetail(id){
  const iv=interviewers.find(i=>i.id===id);
  const ivs=interviews.filter(i=>i.interviewerId===id);
  showToast(`🎙️ ${iv?.name.split('（')[0]}：${ivs.length}场面试，综合均分${ivs.length?Math.round(ivs.reduce((a,b)=>a+b.overall,0)/ivs.length):'—'}`,'info');
}

function switchToInterviewer(id){
  currentRole='interviewer';currentInterviewerId=id;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('show'));
  document.querySelectorAll('.role-tab')[0].classList.add('active');
  document.getElementById('view-interviewer').classList.add('show');
  updateIdentitySelect();renderAll();
}

        <span style="display:flex;gap:4px">${b.tags.map(t=>`<span class="badge ${t==='必读'?'badge-bad':t==='重要'?'badge-ok':'badge-good'}">${t}</span>`).join('')}</span>
      </div>
      <p style="font-size:12px;color:var(--text2);margin-top:4px">${b.desc}</p>
    </div>
  `).join('');
}

// ==================== HELPERS ====================
function shuffle(arr){let m=arr.length,t,i;while(m){i=Math.floor(Math.random()*m--);t=arr[m];arr[m]=arr[i];arr[i]=t}return arr}
function showToast(msg,type){
  const t=document.createElement('div');t.className='toast '+(type||'success');t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.animation='slideIn 0.3s ease reverse';setTimeout(()=>t.remove(),300)},2500);
}

// ==================== MODAL ====================
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

// ==================== RECORD NEW INTERVIEW ====================
function openRecordModal(){
  document.getElementById('recDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('recCandidate').value='';
  document.getElementById('recPosition').value='';
  document.getElementById('recNotes').value='';
  document.getElementById('recordModal').classList.add('show');
}

function submitNewInterview(){
  const candidate=document.getElementById('recCandidate').value.trim();
  const position=document.getElementById('recPosition').value.trim();
  const date=document.getElementById('recDate').value;
  const notes=document.getElementById('recNotes').value.trim();
  if(!candidate||!position||!notes){showToast('请填写候选人、岗位和面试笔记','warn');return;}

  // AI simulates evaluation based on note length and keywords
  const noteLen=notes.length;
  const hasStructure=/步骤|提纲|环节|开场|自我介绍|提问|追问|结尾|框架/i.test(notes);
  const hasBias=/平等|公正|客观|标准|一致|避免|注意/i.test(notes);
  const hasExperience=/氛围|体验|放松|尊重|倾听|微笑|耐心|鼓励/i.test(notes);
  const hasEffect=/能力|技能|匹配|相关|深挖|验证|评估|测试|展示/i.test(notes);

  const structure=Math.min(95,55+hasStructure*18+Math.floor(noteLen/20)+Math.floor(Math.random()*10));
  const bias=Math.min(95,50+hasBias*20+Math.floor(Math.random()*15));
  const experience=Math.min(95,58+hasExperience*15+Math.floor(Math.random()*12));
  const effect=Math.min(95,52+hasEffect*18+Math.floor(Math.random()*10));
  const overall=Math.round((structure+bias+experience+effect)/4);

  // Generate AI note
  const aiNotes=generateAINote(structure,bias,experience,effect,notes);
  const strengths=generateStrengths(structure,bias,experience,effect);
  const improvements=generateImprovements(structure,bias,experience,effect);

  const newIv={
    id:Math.max(0,...interviews.map(i=>i.id))+1,
    interviewerId:currentInterviewerId,candidate,position,date,
    structure,bias,experience,effect,overall,status:'completed',
    note:aiNotes,strengths,improvements
  };
  interviews.unshift(newIv);
  // Update total count
  const iv=interviewers.find(i=>i.id===currentInterviewerId);
  if(iv) iv.total++;

  closeModal('recordModal'); renderAll();
  showToast('🤖 AI评估完成！综合评分：'+overall+'分','info');
}

function generateAINote(s,b,e,ef,notes){
  const parts=[];
  if(s>=80) parts.push('结构化程度良好，面试流程完整有逻辑');
  else if(s>=65) parts.push('结构化程度一般，建议增加面试提纲的准备');
  else parts.push('结构化程度需要大幅提升，建议使用标准化面试提纲');

  if(b>=80) parts.push('偏见控制表现优秀，提问公平公正');
  else if(b>=65) parts.push('偏见控制尚可，仍需警惕"像我效应"等认知偏差');
  else parts.push('存在偏见风险，需注意提问的公平性和一致性');

  if(e>=80) parts.push('候选人体验出色，氛围轻松专业');
  else if(e>=65) parts.push('候选人体验中规中矩，可增加更多互动和倾听');
  else parts.push('候选人体验需要改善，注意倾听和给予候选人充分的表达空间');

  if(ef>=80) parts.push('问题与岗位高度相关，能有效区分候选人水平');
  else if(ef>=65) parts.push('问题有效性一般，部分问题与岗位能力的关联不够紧密');
  else parts.push('问题有效性不足，建议围绕岗位核心能力设计评估维度');

  return parts.join('。')+'。';
}

function generateStrengths(s,b,e,ef){
  const all=[];
  if(s>=75) all.push('面试流程有清晰的逻辑结构');
  if(b>=75) all.push('偏见控制意识强');
  if(e>=75) all.push('候选人体验良好');
  if(ef>=75) all.push('问题设计有效性强');
  if(all.length<2) all.push('具备基本的面试能力基础');
  return all.slice(0,3);
}

function generateImprovements(s,b,e,ef){
  const all=[];
  if(s<75) all.push('建议使用结构化面试提纲');
  if(b<75) all.push('注意避免刻板印象和"像我效应"');
  if(e<75) all.push('增加候选人的表达空间和互动');
  if(ef<75) all.push('设计更聚焦岗位能力的评估问题');
  if(all.length<2) all.push('可以在面试结尾更清晰介绍后续流程');
  return all.slice(0,3);
}

// ==================== ENHANCED PRACTICE (multi-step) ====================
let practiceState = null;

const practiceSteps = {
  s1:[
    {q:'AI候选人：「我熟悉React和Vue，做过几个后台管理项目……」你接下来问什么？',options:['请详细说说你项目中遇到的性能问题怎么解决的','你会Python吗','你老家哪里的'],best:0},
    {q:'AI候选人：「我用了虚拟列表和懒加载优化……」请继续追问：',options:['能画一下你的架构图吗','你觉得加班多正常吗','那你的期望薪资是多少'],best:0},
    {q:'面试结束。AI总结评估中……',options:[],best:-1},
  ],
  s2:[
    {q:'AI候选人：「我主导过DAU 100万的产品从0到1……」你下一个问题？',options:['你具体负责了哪些模块？数据是怎么增长的？','你们团队多少人','你学历是什么'],best:0},
    {q:'AI候选人：「我通过A/B测试优化了转化率……」请深挖：',options:['实验设计是怎么做的？样本量多少？置信度如何？','你用的是哪个平台','你月薪多少'],best:0},
    {q:'面试结束。AI总结评估中……',options:[],best:-1},
  ],
};

function renderPracticeMode(){
  practiceState=null;
  document.getElementById('scenarioGrid').innerHTML=scenarios.map(s=>`
    <button class="scenario-btn" onclick="startPractice('${s.id}')">
      <span class="sc-icon">${s.icon}</span><strong>${s.title}</strong><br><span style="font-size:10px;color:var(--text2)">${s.desc}</span>
    </button>
  `).join('');
  document.getElementById('practiceResult').innerHTML='';
}

function startPractice(sid){
  const steps=practiceSteps[sid]||practiceSteps.s1;
  const scenario=scenarios.find(s=>s.id===sid);
  practiceState={sid,step:0,scores:[]};
  renderPracticeStep(scenario,steps[0],0,steps.length);
}

function renderPracticeStep(scenario,step,idx,total){
  if(!step.q||step.best<0){
    // Final evaluation
    const avgScore=60+Math.floor(Math.random()*28);
    const good=avgScore>=80;
    document.getElementById('practiceResult').innerHTML=`
      <div style="background:var(--card3);border-radius:12px;padding:16px;text-align:left;animation:fadeSlide 0.5s ease">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div class="score-ring sm"><svg width="60" height="60" viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" fill="none" stroke="var(--border)" stroke-width="4"/><circle cx="28" cy="28" r="24" fill="none" stroke="${good?'var(--green)':'var(--gold)'}" stroke-width="4" stroke-dasharray="${2*Math.PI*24}" stroke-dashoffset="${2*Math.PI*24*(1-avgScore/100)}" stroke-linecap="round"/></svg><span class="ring-val">${avgScore}</span></div>
          <div><strong>练习完成！${scenario?.title}</strong><br><span style="font-size:11px;color:var(--text2)">${good?'表现优秀！':'还有提升空间'}</span></div>
        </div>
        <p style="font-size:12px;color:var(--text2)">${good?'你的追问层层递进，有效挖掘了候选人的真实能力。':'建议在追问时更聚焦岗位核心能力，避免偏离主题。'}保持结构化思维，每次面试前准备好评估维度。</p>
        <button class="btn btn-cyan btn-sm" style="margin-top:10px" onclick="renderPracticeMode()">🔄 换个场景练习</button>
      </div>
    `;
    document.getElementById('scenarioGrid').style.display='none';
    return;
  }

  document.getElementById('practiceResult').innerHTML=`
    <div style="background:var(--card3);border-radius:12px;padding:16px;text-align:left;animation:fadeSlide 0.4s ease">
      <div style="font-size:11px;color:var(--text2);margin-bottom:4px">第 ${idx+1}/${total} 步</div>
      <p style="margin-bottom:12px;font-weight:500">${step.q}</p>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${step.options.map((o,i)=>`<button class="scenario-btn" style="text-align:left;padding:10px" onclick="answerPractice(${i})">${i===step.best?'⭐ ':''}${o}</button>`).join('')}
      </div>
    </div>
  `;
}

function answerPractice(choice){
  const scenario=scenarios.find(s=>s.id===practiceState.sid);
  const steps=practiceSteps[practiceState.sid]||practiceSteps.s1;
  const step=steps[practiceState.step];
  const isBest=choice===step.best;

  // Show feedback
  const fb=isBest?'✅ 很好的选择！这是一个有效的追问，能深入评估候选人的真实能力。':'⚠️ 这个问题与评估岗位能力关联不够紧密，建议聚焦在候选人的专业能力和经验上。';

  document.getElementById('practiceResult').innerHTML=`
    <div style="background:var(--card3);border-radius:12px;padding:16px;text-align:left;animation:fadeSlide 0.3s ease">
      <div style="font-size:11px;color:var(--text2);margin-bottom:4px">即时反馈</div>
      <p style="font-size:13px;color:${isBest?'var(--green)':'var(--gold)'}">${fb}</p>
      <button class="btn btn-cyan btn-sm" style="margin-top:10px" onclick="continuePractice()">▶ 继续下一题</button>
    </div>
  `;
  practiceState.scores.push(isBest?1:0);
}

function continuePractice(){
  practiceState.step++;
  const scenario=scenarios.find(s=>s.id===practiceState.sid);
  const steps=practiceSteps[practiceState.sid]||practiceSteps.s1;
  if(practiceState.step>=steps.length){
    renderPracticeStep(scenario,{q:'',best:-1},practiceState.step,steps.length);
  }else{
    renderPracticeStep(scenario,steps[practiceState.step],practiceState.step,steps.length);
  }
}

// ==================== HR COACHING ASSIGN ====================
function assignCoaching(interviewerId){
  const iv=interviewers.find(i=>i.id===interviewerId);
  const task={
    id:Math.max(0,...coachingTasks.map(t=>t.id))+1,
    interviewerId,from:'HR',
    message:`辅导通知：HR注意到你最近的面试质量需要提升。请于本周内完成：1) 复习《面试官法律红线清单》2) 使用结构化面试提纲完成下一场面试 3) 参加周五的面试官认证培训。`,
    date:new Date().toISOString().split('T')[0],read:false
  };
  coachingTasks.push(task);
  showToast(`📤 辅导任务已发送给 ${iv?.name.split('（')[0]}`,'info');
  renderAll();
}

// ==================== COACHING NOTIFICATION CHECK ====================
function renderCoachingNotif(){
  const tasks=coachingTasks.filter(t=>t.interviewerId===currentInterviewerId&&!t.read);
  const div=document.getElementById('coachingNotif');
  if(tasks.length===0){div.style.display='none';return;}
  div.style.display='block';
  div.innerHTML=tasks.map(t=>`
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>📨 <strong>来自${t.from}：</strong>${t.message} <span style="font-size:10px;color:var(--text2)">${t.date}</span></div>
      <button class="btn btn-purple btn-sm" onclick="dismissCoaching(${t.id})">✓ 已读</button>
    </div>
  `).join('');
}

function dismissCoaching(id){
  const t=coachingTasks.find(tt=>tt.id===id);
  if(t) t.read=true;
  renderCoachingNotif();
  showToast('✅ 已标记为已读','success');
}
